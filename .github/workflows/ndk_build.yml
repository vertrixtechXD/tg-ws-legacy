name: Build libtgwsproxy.so (Android API 19+)

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: amurcanov/tg-ws-proxy-android
          path: core
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true
      - name: Build armv7 API 19
        working-directory: core
        env:
          CARGO_NET_RETRY: 3
          RUSTFLAGS: "-C link-arg=-Wl,--allow-shlib-undefined"
        run: |
          cargo ndk -t armeabi-v7a --platform 19 -o ./jniLibs build --release
          mkdir -p out
          cp jniLibs/armeabi-v7a/libtgwsproxy.so out/
      - uses: actions/upload-artifact@v4
        with:
          name: libtgwsproxy-armeabi-v7a-api19
          path: core/out/*.so

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: amurcanov/tg-ws-proxy-android
          path: core
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true
      - name: Build arm64 API 24
        working-directory: core
        run: |
          cargo ndk -t arm64-v8a --platform 24 -o ./jniLibs build --release
          mkdir -p out
          cp jniLibs/arm64-v8a/libtgwsproxy.so out/
      - uses: actions/upload-artifact@v4
        with:
          name: libtgwsproxy-arm64-v8a
          path: core/out/*.so
